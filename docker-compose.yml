version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: enterpriserag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: enterpriserag-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - qdrant
    restart: always

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: enterpriserag-ui
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - api
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: enterpriserag-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: enterpriserag-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: always
